              <text x="80" y="144" text-anchor="middle" font-weight="600">report</text>
              <line x1="220" y1="155" x2="90" y2="195" stroke="var(--border-strong)" stroke-width="0.5"/>
              <rect x="10" y="183" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="80" y="199" text-anchor="middle" font-weight="600">formal</text>
              <line x1="220" y1="160" x2="90" y2="250" stroke="var(--border-strong)" stroke-width="0.5"/>
