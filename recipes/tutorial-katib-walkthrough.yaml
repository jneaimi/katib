name: tutorial-katib-walkthrough
version: 0.1.0
namespace: katib
description: Comprehensive katib walkthrough — cover + preface + 7 modules (Install, Domains, Brand profiles, Composition, Reflect, Vault, Appendix) + Summary/What's-next. Fifteenth and final Phase-3 recipe — CLOSES THE PHASE-3 MIGRATE LIST. Largest recipe by section count (~42 sections, beats mou's 25). Zero new components.
languages:
- en
target_pages:
- 8
- 16
page_limit: 16
when: Self-documenting tutorial describing katib's full architecture — install, domains, brand profiles, covers, diagrams, reflect loop, vault integration, CLI cheatsheet. EN-only; AR deferred pending inputs_by_lang schema. Content is v1-specific placeholder — Phase-4 task to make content v2-accurate.
keywords:
- tutorial
- katib
- walkthrough
- onboarding
- reference
- brand
- reflect
- vault

sections:
  # ===================== COVER + PREFACE =====================

  # 1. Cover — minimalist-typographic (5th production use of this variant)
  - component: cover-page
    variant: minimalist-typographic
    inputs:
      eyebrow: The Complete Walkthrough
      title: Katib — the writer, end to end
      subtitle: From install to self-improvement in six modules
      reference_code: TUT-KATIB-001

  # 2. Preface lead paragraph
  - component: module
    inputs:
      raw_body: |
        <p class="lead" style="font-size: 12pt; line-height: 1.55; color: var(--text-secondary); margin: 12pt 0; font-style: italic;">Katib (<span style="font-family: var(--font-display);">كاتب</span>) is the writer — a bilingual, print-grade document generator that lives inside Claude Code. This walkthrough takes you from install to self-improvement in six modules.</p>

  # 3. "What you'll learn" — objectives-box (uses the Phase-2 primitive)
  - component: objectives-box
    variant: boxed
    inputs:
      label: "What you'll learn"
      items:
        - "Install Katib and render your first PDF in under five minutes."
        - "Pick the right domain, doc type, cover, and layout for any deliverable."
        - "Apply your personal brand so every document looks like yours."
        - "Embed print-grade diagrams, screenshots, and inline charts."
        - "Let Katib learn from your corrections via reflect.py."

  # 4. "Before you begin" checklist (density block #1: inline checklist pattern)
  - component: module
    inputs:
      title: "Before you begin"
      raw_body: |
        <ul style="margin: 6pt 0; padding-left: 0; list-style: none; font-size: 10pt; line-height: 1.6;">
          <li style="margin-bottom: 4pt; padding-left: 20pt; position: relative;"><span style="position: absolute; left: 0; color: var(--accent); font-weight: 700;">☐</span>macOS or Linux with Python 3.10+ and <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">uv</code> installed.</li>
          <li style="margin-bottom: 4pt; padding-left: 20pt; position: relative;"><span style="position: absolute; left: 0; color: var(--accent); font-weight: 700;">☐</span>Claude Code installed, with this skill registered at <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">~/.claude/skills/katib/</code>.</li>
          <li style="margin-bottom: 4pt; padding-left: 20pt; position: relative;"><span style="position: absolute; left: 0; color: var(--accent); font-weight: 700;">☐</span>An Obsidian vault (or any folder) set as your output root.</li>
          <li style="padding-left: 20pt; position: relative;"><span style="position: absolute; left: 0; color: var(--accent); font-weight: 700;">☐</span>Optional: <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">GEMINI_API_KEY</code> for image-based covers (~$0.12 per cover).</li>
        </ul>

  # ===================== MODULE 1 — Install & first render =====================

  # 5. Module 1 header
  - component: module
    inputs:
      eyebrow: "Module 1 · Foundations"
      title: "Install & first render"
      intro: "Five minutes from zero to a branded PDF. You'll install the skill, configure output paths, and render a one-pager so you have proof the pipeline works end-to-end."

  # 6. Module 1 objectives
  - component: objectives-box
    variant: boxed
    inputs:
      label: "Module objectives"
      items:
        - "Install Katib via the shipped installer or from npm."
        - "Create a user config at ~/.config/katib/config.yaml."
        - "Render the one-pager sample and inspect the output folder."

  # 7. Steps heading
  - component: module
    inputs:
      title: "Steps"

  # 8. Step 1 — tutorial-step (3rd production consumer)
  - component: tutorial-step
    inputs:
      number: 1
      title: "Install the skill"
      body: "Katib ships two ways. Clone the repo and run the bundled installer, or install via npm if you prefer a one-liner."

  # 9. Step 1 code block (density pattern: code block)
  - component: module
    inputs:
      raw_body: |
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;"><span style="color: #A1A1AA;"># Option A — installer</span>
        git clone https://github.com/jneaimi/katib.git
        cd katib &amp;&amp; bash install.sh

        <span style="color: #A1A1AA;"># Option B — npm</span>
        npm i -g @jasemal/katib &amp;&amp; katib install</pre>

  # 10. Step 2
  - component: tutorial-step
    inputs:
      number: 2
      title: "Configure output & identity"
      body: "Copy the example config and tell Katib where to put generated documents. The memory.location key is where reflect.py reads its logs from."

  # 11. Step 2 code block
  - component: module
    inputs:
      raw_body: |
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;"><span style="color: #A1A1AA;"># ~/.config/katib/config.yaml</span>
        output:
          destination: vault
          vault_path: ~/vault/content/katib

        memory:
          location: ~/.local/share/katib/memory

        identity:
          author_name: "Jasem Al Neaimi"
          company: "TridenITS"</pre>

  # 12. Step 3
  - component: tutorial-step
    inputs:
      number: 3
      title: "Render the hello-world"
      body: "Render a business-proposal one-pager. On first run uv resolves Katib's PEP-723 deps automatically."

  # 13. Step 3 code block + output confirmation
  - component: module
    inputs:
      raw_body: |
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;">uv run scripts/build.py one-pager \
          --lang en --title "Katib works" \
          --purpose "First render"</pre>
        <p style="font-size: 10pt; line-height: 1.55; margin: 6pt 0;">You should see <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">✓ business-proposal/one-pager.en · 1 page</code>. The output folder contains the PDF, the rendered source HTML, a <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">manifest.md</code>, a token snapshot, and an Obsidian-compatible <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">.katib/run.json</code>.</p>

  # 14. Module 1 tip callout (3rd tip consumer after tutorial-how-to + onboarding)
  - component: callout
    inputs:
      tone: tip
      title: "Tip"
      body: "Set <code>KATIB_OUTPUT_ROOT=/tmp/scratch</code> before a render to send output to a scratch path — handy when iterating on templates. For real client work, pass <code>--project &lt;client-slug&gt;</code> so output lands under <code>projects/&lt;slug&gt;/outputs/</code> and inherits client-specific governance. Full story in Module 6."

  # ===================== MODULE 2 — The ten domains =====================

  # 15. Module 2 header
  - component: module
    inputs:
      eyebrow: "Module 2 · Taxonomy"
      title: "The ten domains"
      intro: "Every document you'll ever build with Katib routes into one of ten domains. Each domain carries its own palette, typographic discipline, page-count guardrails, and reference-code prefixes."

  # 16. Domain taxonomy diagram (density pattern: inline SVG)
