  # ===================== MODULE 4 — Covers, layouts, diagrams, screenshots =====================

  # 23. Module 4 header
  - component: module
    inputs:
      eyebrow: "Module 4 · Composition"
      title: "Covers, layouts, diagrams, screenshots"
      intro: "Katib ships three cover engines, two interior layouts, print-native inline SVG diagrams, and a full screenshot pipeline for tutorials. This module is the composition cheatsheet."

  # 24. Cover styles — kv-list (first consumer in this heavy-kv-list recipe)
  - component: kv-list
    inputs:
      heading: "Cover styles"
      items:
        - term: "minimalist-typographic"
          value: "Free, deterministic, CSS-only. Editorial domains, formal letters, personal docs."
        - term: "neural-cartography"
          value: "Gemini Nano Banana 2. ~$0.12/cover. Institutional weight — proposals, formal."
        - term: "friendly-illustration"
          value: "Gemini Nano Banana 2. ~$0.12/cover. Warm & approachable — tutorials (the one on this document's cover)."

  # 25. Screenshot pipeline diagram + inline diagrams prose (density pattern: inline SVG)
  - component: module
    inputs:
      title: "Screenshot pipeline"
      raw_body: |
        <figure style="margin: 14pt 0 10pt 0; padding: 0; page-break-inside: avoid; text-align: center;">
          <svg viewBox="0 0 520 110" width="520" height="110" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arr-sp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
              </marker>
            </defs>
            <g font-family="var(--font-display)" font-size="11" fill="var(--text)">
              <rect x="10" y="30" width="110" height="50" rx="4" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.75"/>
              <text x="65" y="52" text-anchor="middle" font-weight="600">shot.py</text>
              <text x="65" y="68" text-anchor="middle" font-size="8" fill="var(--text-secondary)">Playwright capture</text>
              <line x1="124" y1="55" x2="150" y2="55" stroke="var(--accent)" stroke-width="1" marker-end="url(#arr-sp)"/>
