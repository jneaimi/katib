          --brand jasem --with-cover \
          --title "Observability SOW"</pre>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10pt; margin: 10pt 0;">
          <div style="border-left: 3pt solid var(--callout-tip-accent); background: var(--callout-tip-bg); padding: 8pt 12pt;">
            <div style="font-size: 8pt; letter-spacing: 0.08em; text-transform: uppercase; color: var(--callout-tip-accent); font-weight: 700; margin-bottom: 3pt;">Do</div>
            <p style="margin: 0; font-size: 9.5pt; line-height: 1.5;">Omit fields you want to inherit from the domain default — partial brands are fine.</p>
