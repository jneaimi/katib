            <span style="height: 22mm; display: block; background: #FAFAFA; border: 0.5pt solid #E4E4E7;"></span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7.5pt; color: var(--text-tertiary); padding: 3pt 0; display: block; background: var(--page-bg);">page_bg</span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7pt; color: var(--text-secondary); padding: 0 0 3pt 0; display: block; background: var(--page-bg);">#FAFAFA</span>
          </figure>
          <figure style="flex: 1 0 0; min-width: 30mm; border: 0.5pt solid var(--border); border-radius: 3pt; padding: 0; overflow: hidden; text-align: center; margin: 0;">
            <span style="height: 22mm; display: block; background: #FEF3C7;"></span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7.5pt; color: var(--text-tertiary); padding: 3pt 0; display: block; background: var(--page-bg);">tag_bg</span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7pt; color: var(--text-secondary); padding: 0 0 3pt 0; display: block; background: var(--page-bg);">#FEF3C7</span>
          </figure>
        </div>

        <h3 style="font-size: 11pt; color: var(--text); margin: 12pt 0 4pt 0; font-weight: 600;">The YAML</h3>
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;"><span style="color: #A1A1AA;"># ~/.katib/brands/jasem.yaml</span>
