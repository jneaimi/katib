        <h3 style="font-size: 11pt; color: var(--text); margin: 12pt 0 4pt 0; font-weight: 600;">Inline diagrams</h3>
        <p style="font-size: 10pt; line-height: 1.55; margin: 6pt 0;">Diagrams are inline SVG embedded directly in the template. WeasyPrint renders SVG natively, so they stay crisp at any print DPI, text is selectable, and colours can pick up the active brand via <code style="background: var(--tag-bg); padding: 1pt 4pt; border-radius: 2pt; font-size: 9pt;">var(--accent)</code> interpolation. <em>Every diagram in this very document is authored this way.</em></p>

  # 26. Module 4 info callout — "When to use what"
  - component: callout
    inputs:
      tone: info
      title: "When to use what"
      body: "Inline SVG for architecture, data-flows, and charts — print-grade. /diagram skill (Excalidraw) for expressive or hand-sketched content, but those rasterise for print. PNG screenshots go through the shot → annotate → frame pipeline."

  # ===================== MODULE 5 — Reflect =====================

  # 27. Module 5 header
  - component: module
    inputs:
      eyebrow: "Module 5 · Self-improvement"
      title: "Reflect — let Katib learn from you"
      intro: "Every successful render appends one line to runs.jsonl. Every correction you log writes to feedback.jsonl. Doc types that don't fit land in domain-requests.jsonl. reflect.py reads all three and surfaces actionable proposals — read-only by design."

  # 28. Module 5 objectives
  - component: objectives-box
    variant: boxed
    inputs:
      label: "Module objectives"
      items:
        - "Understand the three passive-capture logs."
        - "Run reflect.py with time windows and domain filters."
        - "Know when the ≥3× threshold triggers each proposal type."

  # 29. Reflect data flow + threshold chart (density pattern: inline SVG)
