          ar:
            primary: "Cairo"
            fallback: "Amiri, 'Traditional Arabic', serif"

        logo:
          primary: logos/jasem.svg
          max_height_mm: 14</pre>

        <h3 style="font-size: 11pt; color: var(--text); margin: 12pt 0 4pt 0; font-weight: 600;">Using it</h3>
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;">uv run scripts/build.py proposal \
