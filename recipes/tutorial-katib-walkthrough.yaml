        <div style="display: flex; gap: 8pt; margin: 8pt 0; flex-wrap: wrap;">
          <figure style="flex: 1 0 0; min-width: 30mm; border: 0.5pt solid var(--border); border-radius: 3pt; padding: 0; overflow: hidden; text-align: center; margin: 0;">
            <span style="height: 22mm; display: block; background: #F59E0B;"></span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7.5pt; color: var(--text-tertiary); padding: 3pt 0; display: block; background: var(--page-bg);">accent</span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7pt; color: var(--text-secondary); padding: 0 0 3pt 0; display: block; background: var(--page-bg);">#F59E0B</span>
          </figure>
          <figure style="flex: 1 0 0; min-width: 30mm; border: 0.5pt solid var(--border); border-radius: 3pt; padding: 0; overflow: hidden; text-align: center; margin: 0;">
            <span style="height: 22mm; display: block; background: #FB923C;"></span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7.5pt; color: var(--text-tertiary); padding: 3pt 0; display: block; background: var(--page-bg);">accent_2</span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7pt; color: var(--text-secondary); padding: 0 0 3pt 0; display: block; background: var(--page-bg);">#FB923C</span>
          </figure>
          <figure style="flex: 1 0 0; min-width: 30mm; border: 0.5pt solid var(--border); border-radius: 3pt; padding: 0; overflow: hidden; text-align: center; margin: 0;">
            <span style="height: 22mm; display: block; background: #18181B;"></span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7.5pt; color: var(--text-tertiary); padding: 3pt 0; display: block; background: var(--page-bg);">text</span>
            <span style="font-family: var(--font-mono, monospace); font-size: 7pt; color: var(--text-secondary); padding: 0 0 3pt 0; display: block; background: var(--page-bg);">#18181B</span>
          </figure>
