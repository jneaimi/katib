    inputs:
      raw_body: |
        <figure style="margin: 14pt 0 10pt 0; padding: 0; page-break-inside: avoid; text-align: center;">
          <svg viewBox="0 0 520 300" width="520" height="300" xmlns="http://www.w3.org/2000/svg">
            <rect x="220" y="130" width="80" height="40" rx="4" fill="var(--accent)" />
            <text x="260" y="154" text-anchor="middle" font-family="var(--font-display)" font-size="12" font-weight="600" fill="var(--accent-on)">Katib</text>
            <g font-family="var(--font-display)" font-size="9" fill="var(--text-secondary)">
              <line x1="220" y1="140" x2="90" y2="30" stroke="var(--border-strong)" stroke-width="0.5"/>
              <rect x="10" y="18" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="80" y="34" text-anchor="middle" font-weight="600">business-proposal</text>
