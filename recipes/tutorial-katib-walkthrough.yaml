  # 30. Proposal types heading
  - component: module
    inputs:
      title: "The three proposal types"
      body: "Each fires only when a pattern recurs ≥3 times inside the active time window (default 30 days). Below three, noise; at three, signal."

  # 31. Proposal types — kv-list
  - component: kv-list
    inputs:
      items:
        - term: "string-swap"
          value: "Same before→after correction repeats in one domain/lang. Audit templates + references/writing.<lang>.md."
        - term: "new-domain-candidate"
          value: "Repeated requests routed to the same closest-match domain. Consider a new doc_type or a new domain."
        - term: "unused-doc-type"
          value: "A doc_type in styles.json that rendered zero times in the window. Candidate for deprecation — confirm before removing."

  # 32. Typical session code block
  - component: module
    inputs:
      title: "Typical session"
      raw_body: |
        <pre style="background: #27272A; color: #FAFAFA; font-family: var(--font-mono, monospace); font-size: 8.5pt; line-height: 1.5; padding: 10pt 12pt; border-radius: 4pt; white-space: pre-wrap; margin: 8pt 0; page-break-inside: avoid;">uv run scripts/reflect.py                       <span style="color: #A1A1AA;"># last 30 days</span>
        uv run scripts/reflect.py --since 7d             <span style="color: #A1A1AA;"># narrow</span>
        uv run scripts/reflect.py --domain tutorial      <span style="color: #A1A1AA;"># filter</span>
        uv run scripts/reflect.py --propose              <span style="color: #A1A1AA;"># write Markdown proposal file</span>
        uv run scripts/reflect.py --json                 <span style="color: #A1A1AA;"># for scripting</span></pre>

  # 33. Pull-quote — reflect is read-only (3RD PRODUCTION CONSUMER of pull-quote)
  - component: pull-quote
    inputs:
      text: "reflect.py is read-only by design. It does not edit templates, tokens, or references. You apply changes manually after reviewing the proposal — that's what keeps the skill from drifting on weak signal."

  # ===================== MODULE 6 — Vault integration =====================

  # 34. Module 6 header
  - component: module
    inputs:
      eyebrow: "Module 6 · Vault integration"
      title: "Governed by design"
      intro: "Katib is a vault-API-first client. Every render validates against the target zone's governance before a single page of PDF is produced, and writes through Soul Hub so the vault stays consistent across projects. You don't opt in to this — it's how the skill works out of the box."

  # 35. Module 6 objectives
  - component: objectives-box
    variant: boxed
    inputs:
      label: "Module objectives"
      items:
        - "Know where your output lands based on --project."
        - "Choose the right KATIB_VAULT_MODE for interactive work, CI, and offline tests."
        - "Read Katib's exit codes and act on each one."
        - "Use the five vault-admin scripts — audit, migrate, recover, reconcile, repair."

  # 36. Project routing — kv-list
  - component: kv-list
    inputs:
      heading: "Project routing"
      items:
        - term: "--project katib (default)"
          value: "~/vault/content/katib/<domain>/<slug>/ — governed by content/katib/CLAUDE.md. Use for skill-internal samples and self-documentation like this walkthrough."
        - term: "--project <any other slug>"
          value: "~/vault/projects/<slug>/outputs/<domain>/<slug>/ — governed by projects/CLAUDE.md and any projects/<slug>/CLAUDE.md override. Use for real client work."

  # 37. Mode matrix — kv-list
  - component: kv-list
    inputs:
      heading: "The mode matrix"
      items:
        - term: "api (default)"
          value: "POST the manifest to Soul Hub. If Soul Hub is unreachable, fall back to a direct filesystem write tagged katib-fallback so reconciliation can replay the write later. Best for interactive work."
        - term: "strict"
          value: "API only — any network failure raises VaultNetworkError and exits with a non-zero code. Use in CI where silent fallback would hide a real configuration problem."
        - term: "fs"
          value: "Skip the API entirely; write directly to disk via atomic temp-file-then-replace. Pre-render governance check is skipped by design. Use for render-only harnesses that need to stay offline."

  # 38. Pre-render governance prose
  - component: module
    inputs:
      title: "Pre-render governance"
      body: "Before any PDF is rendered, Katib fetches the target zone's governance via GET /api/vault/zones/<path> and validates the proposed manifest against the contract: allowed types, required fields, naming pattern, tag shape. If the zone would reject the write, the build exits 4 with a readable error — no PDF render, no orphan folder."

  # 39. Why-it-matters info callout
  - component: callout
    inputs:
      tone: info
      title: "Why this matters"
      body: "Rendering a 12-page proposal only to discover the target zone disallows <code>type: output</code> is exactly the waste this check prevents. Disable it with <code>--no-strict-governance</code> when developing against a zone whose CLAUDE.md you know is stale."

  # 40. Five vault-admin scripts — kv-list
  - component: kv-list
    inputs:
      heading: "The five vault-admin scripts"
      items:
        - term: "audit_vault.py"
          value: "Read-only walker. Reports governance drift across every Katib manifest in the vault. Text summary by default, --json for tooling, --report for a Markdown note, --summary for a one-line CI gate."
        - term: "migrate_vault.py"
          value: "Proposes and (with --execute) applies retroactive fixes — rebuilds tags, updates katib_version, relocates folders to match current routing. Dry-run by default."
        - term: "recover_vault.py"
          value: "Disaster-recovery tool. Finds folders with .katib/run.json but no manifest.md, reconstructs the manifest from the run log + HTML source. Idempotent on a healthy vault."
        - term: "reconcile_fallbacks.py"
          value: "Walks the vault for manifests tagged katib-fallback and re-POSTs each through Soul Hub, stripping the tag on success. Run this when Soul Hub has been unreachable during a batch render."
        - term: "repair_manifest_links.py"
          value: "Sweeps every manifest body for stale rebuild paths (left behind by folder relocations) and every content/index.md wikilink that points at a moved folder. Idempotent."

  # 41. Exit-code contract — kv-list
  - component: kv-list
    inputs:
      heading: "Exit-code contract"
      items:
        - term: "0"
          value: "Success — manifest written via API or FS."
        - term: "1"
          value: "Generic render failure (template missing, bad input)."
        - term: "2"
          value: "Verification failure (placeholder text, font issue, page overflow at verify time)."
        - term: "3"
          value: "Page-limit exceeded (hard limit from styles.json)."
        - term: "4"
          value: "Governance rejection — pre-render check failed or API returned 4xx. Fix the manifest or the zone's CLAUDE.md."
        - term: "5"
          value: "Network failure in strict mode, or HTTP 409 conflict. Retry or resolve manually."

  # 42. CI tip pull-quote (4th pull-quote use — heaviest single-recipe deployment)
  - component: pull-quote
    inputs:
      text: "Running CI? Pair KATIB_VAULT_MODE=strict with audit_vault.py --summary after every build. Strict mode catches configuration drift at write time; the summary audit catches drift that accumulates across runs."

  # ===================== MODULE 7 / APPENDIX — Command cheatsheet =====================

  # 43. Module 7 header
  - component: module
    inputs:
      eyebrow: "Module 7 · Appendix"
      title: "Command cheatsheet"
      intro: "Everything Katib ships as a CLI, in one place."

  # 44. 20-card cheat-grid — sections-grid dense cols=2 (6th sections-grid consumer)
  - component: sections-grid
    variant: dense
    inputs:
      columns: 2
      items:
        - title: "Render a doc"
          body: "build.py <doc-type> --domain <d> --lang <l> --brand <name>"
        - title: "Render + cover"
          body: "Add --with-cover --cover <style>. Requires GEMINI_API_KEY."
        - title: "Co-locate EN+AR"
          body: "Pass the same --slug to both renders."
        - title: "Verify an output"
          body: "build.py --verify <folder>"
        - title: "Lint templates"
          body: "build.py --check — fast, no render."
        - title: "List brands"
          body: "build.py --list-brands"
        - title: "Generate cover"
          body: "cover.py --domain <d> --style <s> --out <path>"
        - title: "Screenshot"
          body: "shot.py web <url> --out <path>"
        - title: "Annotate"
          body: "annotate.py <png> --arrow x,y --label \"...\""
        - title: "Frame"
          body: "frame.py <png> --style browser-safari"
        - title: "Reflect"
          body: "reflect.py [--since Nd] [--domain <d>] [--propose] [--json]"
        - title: "Log feedback"
          body: "feedback.py add --before ... --after ... --domain ... --lang ..."
        - title: "Audit vault"
          body: "audit_vault.py [--summary | --verbose | --json | --report]"
        - title: "Migrate vault"
          body: "migrate_vault.py [--execute [--yes]] — dry-run default."
        - title: "Recover vault"
          body: "recover_vault.py [--execute] — rebuild orphaned manifests."
        - title: "Reconcile fallbacks"
          body: "reconcile_fallbacks.py [--execute [--yes]]"
        - title: "Repair links"
          body: "repair_manifest_links.py [--execute [--yes]]"
        - title: "Add a domain"
          body: "add_domain.py <name> --doc-types ..."
        - title: "Install fonts"
          body: "install_fonts.py — fetch the seven OFL fonts Katib depends on."
        - title: "Test suite"
          body: "test-all · test-tutorial · test-brand · test-alt-bundles · test-images · test-feedback — 12 harnesses."

  # 45. Environment variables — kv-list
  - component: kv-list
    inputs:
      heading: "Environment variables"
      items:
        - term: "KATIB_OUTPUT_ROOT"
          value: "Override output root — useful for scratch renders."
        - term: "KATIB_VAULT_ROOT"
          value: "Override vault root (default: $HOME/vault). Used by all admin scripts."
        - term: "KATIB_VAULT_MODE"
          value: "api (default) · strict (CI) · fs (offline)."
        - term: "KATIB_VAULT_TIMEOUT"
          value: "HTTP timeout in seconds for vault API calls (default 10)."
        - term: "SOUL_HUB_URL"
          value: "Base URL for the vault API (default http://localhost:2400)."
        - term: "KATIB_SLUG_OVERRIDE"
          value: "Force a specific slug for the next render (or use --slug)."
        - term: "KATIB_IMAGE_MODEL"
          value: "Override Gemini cover model (default nano-banana-2)."
        - term: "KATIB_DEBUG=1"
          value: "Verbose build output."
        - term: "GEMINI_API_KEY"
          value: "Required for image-based covers."

  # 46. File layout — kv-list
  - component: kv-list
    inputs:
      heading: "File layout you should know"
      items:
        - term: "domains/<d>/"
          value: "tokens.json + styles.json + templates/*.{en,ar}.html."
        - term: "styles/layouts/"
          value: "Shared CSS (classic, workbook, cheatsheet)."
        - term: "brands/"
          value: "Shipped brand profiles. User profiles live at ~/.katib/brands/."
        - term: "scripts/"
          value: "build.py, cover.py, shot.py, annotate.py, frame.py, reflect.py, memory.py."
        - term: "references/"
          value: "Design, writing, production, diagrams, screenshots guides — loaded per spec tier."

  # ===================== CLOSING =====================

  # 47. Summary
  - component: module
    inputs:
      title: "Summary"
      body: "You now have the full loop: install, route to a domain, pick a doc type, apply a brand, embed diagrams and screenshots, and let reflect.py surface patterns as you accumulate usage. Katib is deliberately opinionated — that's what makes the output printable without you thinking about design decisions on every render."

  # 48. What's next
  - component: module
    inputs:
      title: "What's next"
      raw_body: |
        <ul style="margin: 6pt 0; padding-left: 22pt; font-size: 10.5pt; line-height: 1.55;">
          <li style="margin-bottom: 4pt;">Render a real deliverable — your first client proposal, or a tutorial you've been putting off.</li>
          <li style="margin-bottom: 4pt;">Write a second brand profile for a client and hand them ready-to-print drafts.</li>
          <li>After ten or twenty renders, run reflect.py and see which patterns surface — that's how Katib learns what <em>you</em> need.</li>
        </ul>
