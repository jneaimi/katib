              <rect x="370" y="72" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="440" y="88" text-anchor="middle" font-weight="600">financial</text>
              <line x1="300" y1="150" x2="430" y2="140" stroke="var(--border-strong)" stroke-width="0.5"/>
              <rect x="370" y="128" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="440" y="144" text-anchor="middle" font-weight="600">editorial</text>
              <line x1="300" y1="155" x2="430" y2="195" stroke="var(--border-strong)" stroke-width="0.5"/>
              <rect x="370" y="183" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="440" y="199" text-anchor="middle" font-weight="600">marketing-print</text>
              <line x1="300" y1="160" x2="430" y2="250" stroke="var(--border-strong)" stroke-width="0.5"/>
              <rect x="370" y="238" width="140" height="24" rx="3" fill="var(--page-bg)" stroke="var(--border-strong)" stroke-width="0.5"/>
              <text x="440" y="254" text-anchor="middle" font-weight="600">legal</text>
            </g>
          </svg>
          <figcaption style="font-size: 8.5pt; color: var(--text-tertiary); font-style: italic; margin-top: 4pt;">Ten domains, each with its own palette, typography, and page-count guardrails.</figcaption>
        </figure>

  # 17. Quick-pick table heading
  - component: module
    inputs:
      title: "Quick-pick table"

  # 18. Domains data-table (8TH PRODUCTION CONSUMER — streak continues)
  - component: data-table
    inputs:
      columns:
        - label: "User signal"
        - label: "Domain"
        - label: "Doc types"
      rows:
        - - "Commercial offer, SOW"
          - "business-proposal"
          - "proposal, one-pager, letter"
        - - "How-to, onboarding, handoff"
          - "tutorial"
          - "how-to, cheatsheet, tutorial, onboarding, handoff"
        - - "Research, audit, annual"
          - "report"
          - "research, progress, annual, audit"
        - - "NOC, authority, circular"
          - "formal"
          - "noc, government-letter, circular, authority-letter"
        - - "CV, cover letter, bio"
          - "personal"
          - "cv, cover-letter, bio"
        - - "Syllabus, assignment, research proposal"
          - "academic"
          - "syllabus, assignment-brief, lecture-notes, research-proposal"
        - - "Invoice, quote, statement"
          - "financial"
          - "invoice, quote, statement, financial-summary"
        - - "White paper, article, op-ed"
          - "editorial"
          - "white-paper, article, op-ed, case-study"
        - - "Sell sheet, pitch deck"
          - "marketing-print"
          - "sell-sheet, product-brief, capability-statement, slide-deck"
        - - "Agreement, MOU, NDA"
          - "legal"
          - "service-agreement, mou, nda, engagement-letter"

  # 19. Module 2 info callout — "How routing works"
  - component: callout
    inputs:
      tone: info
      title: "How routing works"
      body: "When you say <em>\"make me a proposal\"</em>, Katib matches the keyword to <code>business-proposal</code>. Unknown doc types route to the closest match and get logged to <code>domain-requests.jsonl</code> so <code>reflect.py</code> can flag candidates for new domains later."

  # ===================== MODULE 3 — Brand profiles =====================

  # 20. Module 3 header
  - component: module
    inputs:
      eyebrow: "Module 3 · Identity"
      title: "Brand profiles — make it look like you"
      intro: "Every Katib render respects a four-layer cascade: domain tokens → brand profile → CLI flags → inline overrides. A brand profile is a single YAML file that swaps colours, fonts, author name, and logo without touching any template."

  # 21. Module 3 objectives
  - component: objectives-box
    variant: boxed
    inputs:
      label: "Module objectives"
      items:
        - "Write a brand profile YAML at ~/.katib/brands/<name>.yaml."
        - "Pass --brand <name> to any render."
        - "Understand what falls back to the domain default when the brand omits a field."

