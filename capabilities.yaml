components:
  callout:
    namespace: katib
    tier: primitive
    version: 0.2.0
    languages:
    - en
    - ar
    variants: []
    description: Boxed message with left accent border and tinted background. Tones map to conventional
      UX patterns — `info | warn | danger | tip` for status messages; `neutral` for non-status highlighted
      boxes (subject lines, non-binding notices, inline callout paragraphs).
    used_in_recipes: 14
  citation:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Inline numbered citation marker — superscript number that points at a references-list
      entry. For academic, editorial, legal. Pairs with the references-list section (same doc).
    used_in_recipes: 0
  clause-list:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Numbered legal-clause list — ordered list (ol) with counter-based decimal numbering in
      accent color. Used for MoU clauses, NDA provisions, service-agreement sections, and any numbered
      legal-body structure where clause references must render prominently. Items are plain-text strings
      (or trusted HTML via raw items). Replaces the Day-0 `recitals-block` plan — v1 evidence shows legal-domain
      body uses numbered-clause lists, not WHEREAS preambles.
    used_in_recipes: 8
  code-block:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - terminal
    - inline
    description: Preformatted code / shell-command block. Two variants — `terminal` (dark zinc background,
      for CLI samples and install sequences) and `inline` (theme-aware light, for single-command references).
      Accepts raw code content via `code` input (Jinja-safe — recipes may embed comment spans). Use for
      any monospace code, config snippet, or CLI block. Distinct from `callout` (prose) and `kv-list`
      (structured pairs).
    used_in_recipes: 1
  data-table:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - bordered
    - dense
    description: Accessible tabular data — headers, rows, per-column alignment, alt-row backgrounds. Supports
      numeric columns (right-aligned + tabular-nums) and cells with optional sub-text (invoice description
      lines). Used by white-paper (numeric time-series), proposal (deliverables), invoice (line items),
      onboarding (30/60/90 windows).
    used_in_recipes: 6
  eyebrow:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - muted
    - accent
    description: Small preheader label above a title or section heading.
    used_in_recipes: 1
  figure-with-caption:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - full-width
    - inset
    description: Image with optional caption below — core visual primitive.
    used_in_recipes: 0
  metric-block:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - stacked
    - inline
    description: Key-metric display — label + value + optional delta. For dashboards, executive summaries,
      and report hero rows. Renders inline-block so multiple metrics lay out side-by-side without ceremony.
    used_in_recipes: 3
  pull-quote:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - rule-leading
    - large-quote
    description: Emphasized blockquote — larger text with accent rule and optional attribution.
    used_in_recipes: 4
  rule:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - hairline
    - strong
    - double
    description: Horizontal divider between content blocks.
    used_in_recipes: 2
  signature-block:
    namespace: katib
    tier: primitive
    version: 0.2.0
    languages:
    - en
    - ar
    variants:
    - line-over
    - label-prefix
    - recipient
    description: Named-party block for formal documents — renders signatories (closing signature blocks)
      or addressees (recipient blocks) depending on variant. Supports name + title + organization + location
      + date + label.
    used_in_recipes: 3
  signature-field-block:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Blank-field signature grid for counterparty execution — multiple parties side by side,
      each with a column of labeled blank input lines (Name / Title / Signature / Date). Distinct from
      `signature-block` (pre-filled named parties) and `multi-party-signature-block` (pre-filled multi-signatory
      closing). Use when a document will be printed, countersigned by hand, and returned — typical in
      commercial quotes, MoUs, service agreements, proposals.
    used_in_recipes: 3
  skill-bar-list:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Skill/proficiency list — named items with visual level bars (1-5 scale). Each item renders
      as name + horizontal bar filled to a level-driven percentage (l1=20%, l5=100%). Used for CV Languages
      + Core Skills sections; future portfolio/bio proficiency displays. Reusable across personal-domain
      recipes for any named-proficiency rendering.
    used_in_recipes: 0
  step-circle:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - solid
    - outline
    description: Numbered circle marker for sequenced steps in a procedure.
    used_in_recipes: 1
  tag:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - filled
    - outline
    description: Inline badge/chip label — short noun, tonal background.
    used_in_recipes: 1
  tag-chips:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Inline tag-pill list — rounded rectangular chips for tags, tools, technologies, keywords,
      or topics. Items render as inline-block pills with accent-muted background and small-font, semi-bold
      text. Reusable across CV Tools section, future bio/portfolio skill lists, blog post keywords, editorial
      metadata tags.
    used_in_recipes: 1
  appendix-page:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: 'Appendix content with a distinct running header. Uses a named @page rule that emits
      "Appendix" (localized) in the top margin, so the reader always knows which section they''re in.
      Flows across multiple pages — appendix material is usually long-form (raw data, supporting references,
      derivations). Always starts on a new page.

      '
    used_in_recipes: 1
  chart-bar:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - default
    description: Horizontal bar chart. Bars grow from the language-origin side. Factual, inline-svg only.
    used_in_recipes: 1
  chart-donut:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - default
    - with-legend
    - centered-stat
    description: Proportional breakdown chart. Data is always inline-svg — factual, deterministic, brand-palette-driven.
    used_in_recipes: 1
  chart-sparkline:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - default
    - with-delta-badge
    description: Compact trendline. Line direction is always left-to-right regardless of lang (chronological
      convention). Inline-svg only.
    used_in_recipes: 1
  cv-layout:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: 2-column sidebar+main page layout for CV / profile / portfolio recipes. Emits a full-page
      CSS grid with 70mm sidebar (dark accent background) + 1fr main column. Sidebar and main content
      are supplied as raw HTML via `sidebar_html` and `main_html` inputs — callers compose sidebar primitives
      (skill-bar-list, tag-chips) and main sections inline. Designed specifically for the CV structural
      shape; future reuse expected for portfolio and profile pages.
    used_in_recipes: 1
  executive-summary:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - default
    - bordered
    description: Key takeaways box for the top of reports, proposals, and white-papers. Header + 2-4 labeled
      bullet rows + optional footer. Sets reader expectations before the body. Rendered with a left-accent
      rail for visual separation from regular flow.
    used_in_recipes: 6
  financial-summary:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - compact
    description: Totals box for invoices and quotes. Right-aligned numeric rows with labels on the leading
      side; one emphasized Total row with accent background. Container is flex-end positioned (70mm wide)
      so it naturally aligns to the trailing edge of the page. Optional currency code shown alongside
      totals. Used by financial/invoice and financial/quote.
    used_in_recipes: 2
  front-matter:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Title-first title-page section. Eyebrow, title, subtitle, hairline rule, meta strip (author/date/ref).
      Lighter than a full cover-page.
    used_in_recipes: 6
  full-bleed-page:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - image-only
    - with-overlay
    description: A single page with zero margins — for full-bleed photography, chapter-opener images,
      infographics that extend to the sheet edge. Caption + optional overlay text render inside the image
      area with a legibility scrim. Atomic — one page, never splits.
    used_in_recipes: 0
  kv-list:
    namespace: katib
    tier: section
    version: 0.2.0
    languages:
    - en
    - ar
    variants:
    - dense
    - spacious
    - boxed
    description: Term + value pairs rendered as a two-column grid. Definitions, glossaries, cheat-sheet
      reference pairs, metadata summaries, and (as of 0.2.0) field-summary boxes for formal documents
      (NOC employee details, invoice meta blocks).
    used_in_recipes: 8
  landscape-section:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Wraps content in a landscape-oriented page. Use for wide data tables, timelines, horizontal
      charts, or any content that overflows A4 portrait. Forces a page break before and after so the landscape
      page stands alone in the flow.
    used_in_recipes: 1
  letterhead:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - formal
    - commercial
    description: Two-column header strip for letters, NOCs, invoices, quotes. Brand/company on the leading
      side; meta block (ref code + date + custom lines) on the trailing side. Sits above body content
      on page 1 — does NOT force a page break (that's `front-matter`'s job).
    used_in_recipes: 5
  masthead-personal:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Personal-identity masthead — name + tagline on leading side, contact stack (email, phone,
      location) on trailing side. Bottom accent rule. For personal-brand documents (cover-letter, CV,
      bio). Distinct from `letterhead` (which is for organizational/company identity).
    used_in_recipes: 2
  module:
    namespace: katib
    tier: section
    version: 0.3.0
    languages:
    - en
    - ar
    variants:
    - plain
    - numbered
    description: Flexible body unit — optional numbered eyebrow, heading, intro, and body content. All
      heading fields are optional; use without a title for continuous-prose sections (letter bodies, abstract
      paragraphs, recitals). `body` is auto-escaped plain text; `raw_body` accepts trusted HTML (tables,
      inline SVG, pull-quotes, callouts) for recipe-supplied content.
    used_in_recipes: 31
  multi-party-signature-block:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - line-over
    - minimal
    description: Multi-party signature grid — side-by-side signature boxes for formal documents (NOC,
      MOU, contracts). Each party has name + optional title + optional email. Responsive grid auto-flows
      based on party count (2+ parties supported).
    used_in_recipes: 2
  objectives-box:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - boxed
    - minimal
    description: Labeled bullet list — "What you'll learn", module objectives, or scope items.
    used_in_recipes: 4
  reference-strip:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - flat
    - tagged
    description: Compact list of further-reading references or source citations.
    used_in_recipes: 5
  references-list:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - default
    - compact
    description: Numbered bibliography section. Pairs with the citation primitive — each entry corresponds
      to a citation number in the body (e.g. [1] in text → entry 1 here). For academic, editorial, legal
      docs. Supports one of the three major citation styles via variant — Chicago (author-first), APA
      (year-first), or a generic minimal style.
    used_in_recipes: 2
  section-divider-page:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - numeric
    - minimal
    description: '"Part II" style divider — a full page that marks a major section boundary in a long
      document. Large part number + title + optional subtitle, centered typography. Use between acts in
      a white-paper, chapters in a report, or phases in a proposal. Atomic, always on its own page.

      '
    used_in_recipes: 1
  sections-grid:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - dense
    - bordered
    description: Titled-card grid — N cards arranged in 2, 3, or 4 columns. Each card has a title and
      either plain-text body or trusted HTML raw_body. Serves cheatsheet sections (6 cards), one-pager
      2x2 body grids, contact-card layouts, and any "group of peer sections" shape.
    used_in_recipes: 6
  slide-frame:
    namespace: katib
    tier: section
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - title-only
    - content
    - two-column
    - image-background
    description: Single 16:9 landscape page sized for slide-deck content — keynote, talk slides, pitch
      frames. Each slide is atomic (one slide = one page). Use multiple slide-frame sections in a row
      to build a full deck. Variants — title-only, content, two-column, image-background — cover the common
      slide layouts.
    used_in_recipes: 1
  summary:
