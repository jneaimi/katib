components:
  callout:
    namespace: katib
    tier: primitive
    version: 0.2.0
    languages:
    - en
    - ar
    variants: []
    description: Boxed message with left accent border and tinted background. Tones map to conventional
      UX patterns — `info | warn | danger | tip` for status messages; `neutral` for non-status highlighted
      boxes (subject lines, non-binding notices, inline callout paragraphs).
    used_in_recipes: 12
  clause-list:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Numbered legal-clause list — ordered list (ol) with counter-based decimal numbering in
      accent color. Used for MoU clauses, NDA provisions, service-agreement sections, and any numbered
      legal-body structure where clause references must render prominently. Items are plain-text strings
      (or trusted HTML via raw items). Replaces the Day-0 `recitals-block` plan — v1 evidence shows legal-domain
      body uses numbered-clause lists, not WHEREAS preambles.
    used_in_recipes: 1
  data-table:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - bordered
    - dense
    description: Accessible tabular data — headers, rows, per-column alignment, alt-row backgrounds. Supports
      numeric columns (right-aligned + tabular-nums) and cells with optional sub-text (invoice description
      lines). Used by white-paper (numeric time-series), proposal (deliverables), invoice (line items),
      onboarding (30/60/90 windows).
    used_in_recipes: 6
  eyebrow:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - muted
    - accent
    description: Small preheader label above a title or section heading.
    used_in_recipes: 1
  figure-with-caption:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - full-width
    - inset
    description: Image with optional caption below — core visual primitive.
    used_in_recipes: 0
  pull-quote:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - rule-leading
    - large-quote
    description: Emphasized blockquote — larger text with accent rule and optional attribution.
    used_in_recipes: 3
  rule:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants:
    - hairline
    - strong
    - double
    description: Horizontal divider between content blocks.
    used_in_recipes: 2
  signature-block:
    namespace: katib
    tier: primitive
    version: 0.2.0
    languages:
    - en
    - ar
    variants:
    - line-over
    - label-prefix
    - recipient
    description: Named-party block for formal documents — renders signatories (closing signature blocks)
      or addressees (recipient blocks) depending on variant. Supports name + title + organization + location
      + date + label.
    used_in_recipes: 3
  signature-field-block:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Blank-field signature grid for counterparty execution — multiple parties side by side,
      each with a column of labeled blank input lines (Name / Title / Signature / Date). Distinct from
      `signature-block` (pre-filled named parties) and `multi-party-signature-block` (pre-filled multi-signatory
      closing). Use when a document will be printed, countersigned by hand, and returned — typical in
      commercial quotes, MoUs, service agreements, proposals.
    used_in_recipes: 1
  skill-bar-list:
    namespace: katib
    tier: primitive
    version: 0.1.0
    languages:
    - en
    - ar
    variants: []
    description: Skill/proficiency list — named items with visual level bars (1-5 scale). Each item renders
      as name + horizontal bar filled to a level-driven percentage (l1=20%, l5=100%). Used for CV Languages
