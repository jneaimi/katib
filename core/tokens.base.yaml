# Katib v2 base tokens — lowest-priority defaults shipped with the skill.
# Brand profiles override specific keys. CLI flags override both.
#
# Three merge layers:
#   core/tokens.base.yaml  (this file — shipped defaults)
#   brands/<brand>.yaml    (brand override)
#   render-time flags      (per-invocation override)
#
# Components declare `requires.tokens: [...]` — validator checks that every
# declared token resolves at render time after the three-layer merge.

colors:
  # Surface
  page_bg: "#FFFFFF"
  text: "#141414"
  text_secondary: "#4A4A4A"
  text_tertiary: "#7A7268"

  # Accent (neutral default — brands override)
  accent: "#1F3A68"
  accent_2: "#D4A437"
  accent_on: "#FFFFFF"

  # Structure
  border: "#E5DED1"
  border_strong: "#CFC4AF"

  # Inline tags / code / callouts
  tag_bg: "#EFE5D6"
  tag_fg: "#141414"
  code_bg: "#F3EEE3"
  code_fg: "#141414"

  callout_info_bg: "#EAF1F4"
  callout_info_accent: "#3A7D8B"
  callout_warn_bg: "#F5EDDA"
  callout_warn_accent: "#B8842A"
  callout_danger_bg: "#F5E1E1"
  callout_danger_accent: "#B53E3E"
  callout_tip_bg: "#E8F0E2"
  callout_tip_accent: "#5A8549"

  step_circle_bg: "#1F3A68"
  step_circle_fg: "#FFFFFF"

fonts:
  en:
    primary: "Inter"
    display: "Inter"
    mono: "JetBrains Mono"
    fallback: "system-ui, -apple-system, sans-serif"
  ar:
    primary: "Cairo"
    display: "Cairo"
    mono: "JetBrains Mono"
    fallback: "Tahoma, sans-serif"

identity:
  author_name: ""
  author_name_ar: ""
  email: ""
  phone: ""

logo:
  primary: null
  max_height_mm: 18
