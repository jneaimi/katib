<figure class="katib-figure katib-figure--{{ variant or 'full-width' }}" lang="ar" dir="rtl">
{%- if input.image.resolved_svg %}
    <div class="katib-figure__svg">{{ input.image.resolved_svg | safe }}</div>
{%- else %}
    <img class="katib-figure__img" src="{{ input.image.resolved_path }}" alt="{{ input.alt_text }}">
{%- endif %}
{%- if input.caption %}
    <figcaption class="katib-figure__caption">{{ input.caption }}</figcaption>
{%- endif %}
</figure>
