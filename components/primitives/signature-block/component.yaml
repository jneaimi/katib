name: signature-block
tier: primitive
version: 0.1.0
namespace: katib
description: Signed-by / date / name block for formal documents, contracts, letters.
languages: [en, ar]
requires:
  tokens: [text, text_secondary, border_strong]
accepts:
  inputs:
    - name:
        type: string
        required: true
        description: Signatory's full name.
    - title:
        type: string
        required: false
        description: Job title or role.
    - date:
        type: string
        required: false
        description: Signing date (free-form — caller formats).
    - label:
        type: string
        required: false
        description: Prefix label — defaults to "Signed" (EN) / "التوقيع" (AR).
variants:
  - line-over
  - label-prefix
page_behavior:
  break_inside: avoid
