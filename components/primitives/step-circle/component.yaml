name: step-circle
tier: primitive
version: 0.1.0
namespace: katib
description: Numbered circle marker for sequenced steps in a procedure.
languages: [en, ar]
requires:
  tokens: [step_circle_bg, step_circle_fg, text]
accepts:
  inputs:
    - number:
        type: int
        required: true
        description: Step number — typically 1-based.
    - label:
        type: string
        required: false
        description: Optional caption to the side of the circle.
variants:
  - solid
  - outline
