name: eyebrow
tier: primitive
version: 0.1.0
namespace: katib
description: Small preheader label above a title or section heading.
languages: [en, ar]
requires:
  tokens: [text_tertiary, accent]
  fonts: [primary, display]
accepts:
  inputs:
    - text:
        type: string
        required: true
        description: The eyebrow text — short noun phrase, rendered uppercase in EN.
variants:
  - muted
  - accent
page_behavior:
  mode: flowing
