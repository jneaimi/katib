name: cover-page
tier: cover
version: 0.2.0
namespace: katib
description: Full-page document opener. Four variants — minimalist-typographic (CSS-only), image-background (full-bleed + dark scrim), neural-cartography (Gemini + dark scrim), framed-canvas (light editorial canvas, dark text on warm off-white image, no scrim).
languages: [en, ar]
requires:
  tokens: [text, text_secondary, text_tertiary, accent, accent_2, border_strong, page_bg]
  fonts: [display, primary]
  brand_fields: [logo.primary, identity.author_name]
accepts:
  inputs:
    - eyebrow:
        type: string
        required: false
        description: Category label above the title (e.g. "Tutorial", "Strategy brief").
    - title:
        type: string
        required: true
    - subtitle:
        type: string
        required: false
    - reference_code:
        type: string
        required: false
        description: Monospace code rendered in the footer strip.
    - image:
        type: image
        required: false
        sources_accepted: [user-file, url, gemini]
        fallback: gemini
        fallback_prompt: "editorial abstract, soft organic gradient, neutral palette"
        description: Full-bleed cover image. Required when variant is image-background, neural-cartography, or framed-canvas; ignored for minimalist-typographic.
variants:
  - minimalist-typographic
  - image-background
  - neural-cartography
  - framed-canvas
page_behavior:
  mode: atomic
  break_after: always
  min_height: 253mm
