<section class="katib-section katib-summary" lang="ar" dir="rtl">
    <div class="katib-eyebrow katib-eyebrow--muted" lang="ar">{{ input.eyebrow or 'خاتمة' }}</div>
    <h2 class="katib-summary__heading">{{ input.heading or 'ملخص' }}</h2>
{%- if input.body %}
    <p class="katib-summary__body">{{ input.body }}</p>
{%- endif %}
{%- if input.items %}
    <ul class="katib-summary__items">
{%- for item in input.items %}
        <li>{{ item }}</li>
{%- endfor %}
    </ul>
{%- endif %}
</section>
