name: process-flow
tier: section
version: 0.1.0
namespace: katib
description: Numbered step-by-step flow diagram. Renders 3–6 steps as connected nodes (horizontal row or vertical column), each with a number, label, and optional one-line description. Use for "how it works", process diagrams, onboarding flows, or any sequence where the order matters.
languages: [en, ar]
requires:
  tokens: [text, text_secondary, text_tertiary, accent, accent_on, border, page_bg]
  fonts: [display, primary]
accepts:
  inputs:
    - eyebrow:
        type: string
        required: false
        description: Small uppercase label above the section heading.
    - title:
        type: string
        required: false
        description: Section heading above the flow.
    - orientation:
        type: string
        required: false
        default: horizontal
        description: '"horizontal" (default — row of nodes with arrows) or "vertical" (stacked nodes with vertical connectors).'
    - steps:
        type: array
        required: true
        description: Array of {label, body?} entries. 3–6 steps recommended for horizontal; up to 8 for vertical.
variants:
  - default
page_behavior:
  mode: flowing-protect-items
