name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install WeasyPrint system libraries
        # Pango/Cairo/GDK-Pixbuf are runtime deps for WeasyPrint rendering.
        # Katib's install.sh prompts users to install these locally; CI must
        # provision them up-front.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run tests
        env:
          # Ensure API-key-guarded tests take the unset-key branch.
          GEMINI_API_KEY: ""
        run: uv run pytest -q

  lint-install-sh:
    name: install.sh syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: bash -n install.sh
        run: bash -n install.sh
      - name: bash -n uninstall.sh
        run: bash -n uninstall.sh
